<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Welcome To HYDRA</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #08070b;
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before, body::after {
            content: "";
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.25) 0%, rgba(0,0,0,0) 70%);
            filter: blur(60px);
            z-index: 1;
            pointer-events: none;
        }
        body::before { top: 15%; left: 20%; }
        body::after { bottom: 15%; right: 20%; }

        .main-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 40px 35px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .online-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.2);
            color: #a78bfa;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 100px;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
        }

        .online-badge::before {
            content: "";
            width: 6px;
            height: 6px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            line-height: 1.3;
            color: #ffffff;
            margin-bottom: 28px;
            letter-spacing: -0.5px;
        }

        .quote-container {
            margin-bottom: 32px;
            padding: 0 10px;
        }

        h4 {
            font-size: 1rem;
            font-weight: 400;
            color: #d1d5db;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        h5 {
            font-size: 0.8rem;
            font-weight: 500;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p.privacy-text {
            font-size: 0.9rem;
            color: #9ca3af;
            margin-bottom: 32px;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        a {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease-in-out;
        }

        .btn-primary {
            background: #7c3aed;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .btn-primary:hover {
            background: #6d28d9;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            color: #e5e7eb;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        @media (max-width: 480px) {
            .main-card {
                padding: 30px 20px;
                border-radius: 20px;
            }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="online-badge">Онлайн: {{users_count}}</div>
        
        <h1>Добро пожаловать в слепую зону интернета</h1>
        
        <div class="quote-container">
            <h4>«{{random_quote.quote}}»</h4>
            <h5>{{random_quote.autor}}</h5>
        </div>
        
        <p class="privacy-text">Мы просто ценим ваше право на цифровое уединение ._.</p>
        
        <div class="actions">
            <a href="{% url 'login' %}" class="btn-primary">Войти в аккаунт</a>
            <a href="https://github.com/amirustop777-spec/hydra-messager" class="btn-secondary">Наш репозиторий на GitHub</a>
        </div>
    </div>

</body>
</html>
