{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Добро пожаловать в HYDRA</title>
    <meta name="description" content="Защитите свою конфиденциальность в интернете с HYDRA.">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/welcome.css' %}?v=3">
</head>
<body>

    <main class="main-card">
        <div class="online-badge" role="status" aria-live="polite">
            Онлайн: {{ users_count }}
        </div>

        <h1>Добро пожаловать в слепую зону интернета</h1>

        <blockquote class="quote-container">
            <p>{{random_quote.quote}}</p>
        </blockquote>

        <blockquote class="autor_container">
            <p>{{random_quote.autor}}</p>
        </blockquote>

        <p class="privacy-text">Мы просто ценим ваше право на цифровое уединение ._.</p>

        <nav class="actions" aria-label="Основные действия">
            <a href="{% url 'login' %}" class="btn-primary">Войти в аккаунт</a>
            <a href="https://github.com" class="btn-secondary" target="_blank" rel="noopener noreferrer">GitHub</a>
        </nav>
    </main>

</body>
</html>
